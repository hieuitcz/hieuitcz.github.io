
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Học cùng Bơ</title>
<link rel="icon" href="https://raw.githubusercontent.com/hieuitcz/hieuitcz.github.io/main/img/favicon.png" />
<link rel="manifest" href="/kid/manifest.json">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Arial",sans-serif;
    background:#ffecec;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .app{
    width:min(950px,100vw);
    height:min(9500px,100vh);
    position:relative;
    overflow:hidden;
  }

  /* CONTROLS */
  #controls{
    position:absolute;top:8px;right:8px;z-index:10;
    display:flex;flex-direction:column;gap:6px;
  }
  .lang-btn{
    padding:6px 12px;border-radius:16px;border:none;
    font-weight:bold;cursor:pointer;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
    background:#ffffff;
  }
  .lang-btn.active{
    background:#48b000;color:white;
    box-shadow:0 4px 12px rgba(72,176,0,0.4);
  }


  /* TRANG CHỦ */
  #screenHome{
    position:absolute;inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .home-inner{
    width:90%;
    height: auto !important;
    max-height: 95vh !important;
    overflow-y: auto !important;
    padding: 15px 20px 80px !important;
    margin-top: 30px;
  }
  .home-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:18px;
  }
  
  
  
  
  
@media (max-width: 768px) {
  .home-inner {
      /* -height: 85vh !important;- */
    overflow-y: auto !important;
    padding: 20px 10px 100px !important;
  }
  .home-grid {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 16px !important;
    min-height: 0 !important;
  }
  .card-small {
    padding: 12px 8px !important;
  }
  .card-small img {
    max-height: 70px !important;
  }
  .card-small span {
    font-size: 1rem !important;
  }
    .app{
    width:min(600px,100vw);
    height:min(600px,100vh);
	}
	.name {
    font-size: 1.8rem !important;
	}
}
@media (max-width: 480px) {
  .home-inner {
    padding: 15px 8px 90px !important;
  }
  .home-grid {
    gap: 12px !important;
  }
  .card-small img {
    max-height: 60px !important;
  }
  .card-small span {
    font-size: 0.95rem !important;
  }
    .app{
    width:min(600px,100vw);
    height:min(600px,100vh);
	}
	.name {
    font-size: 1.8rem !important;
	}
}
/* FIX LANDSCAPE MOBILE - quay ngang 4 cột */
@media (max-height: 500px) and (min-width: 600px) {
  .home-inner {
    height: auto !important;
    max-height: 95vh !important;
    overflow-y: auto !important;
    padding: 15px 20px 80px !important;
	margin-top: 30px;
  }
  .home-grid {
    grid-template-columns: repeat(4, 1fr) !important;
    gap: 12px !important;
  }
  .card-small {
    padding: 10px 6px !important;
  }
  .card-small img {
    max-height: 55px !important;
  }
    .app{
    width:min(600px,100vw);
    height:min(600px,100vh);
	}
	.card-small span {
    font-size: 0.8rem !important;
    font-weight: 600;
    color: #333;
	}
	.name {
    font-size: 1.8rem !important;
	}
}






  .card-small{
    background:#ffffff;
    border-radius:26px;
    box-shadow:0 4px 14px rgba(0,0,0,0.12);
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:10px;
    cursor:pointer;
    transition:transform .15s, box-shadow .15s;
  }
  .card-small:hover{
    transform:translateY(-4px);
    box-shadow:0 8px 22px rgba(0,0,0,0.18);
  }
  .card-small img{
    max-width:90%;
    max-height:80px;
    margin-bottom:6px;
  }
  .card-small span{
    font-size:1.1rem;
    font-weight:600;
    color:#333;
  }

  /* NÚT XANH */
  .btn{
    position:absolute;
    width:78px;height:78px;
    border-radius:50%;
    background:#48b000;
    border:4px solid #2f7c00;
    box-shadow:0 4px 0 #205400,0 8px 18px rgba(0,0,0,0.25);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:5;
  }
  .btn-inner{
    width:68%;height:68%;
    border-radius:50%;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 #205400;}
  .arrow-left{
    border-top:16px solid transparent;
    border-bottom:16px solid transparent;
    border-right:26px solid #48b000;
  }
  .arrow-right{
    border-top:16px solid transparent;
    border-bottom:16px solid transparent;
    border-left:26px solid #48b000;
  }
  .arrow-up{
    border-left:16px solid transparent;
    border-right:16px solid transparent;
    border-bottom:26px solid #48b000;
  }

  /* FLASHCARD */
  #screenFlash{
    position:absolute;inset:0;
    display:none;
  }
  .cloud{
    position:absolute;
    top:52%;left:50%;
    transform:translate(-50%,-52%);
    width:86%;height:82%;
    background:#fff;
    border:1px solid #f2f2f2;
    border-radius:28px;
    box-shadow:0 2px 12px rgba(0,0,0,0.06);
    z-index:1;
  }
  .animal-wrap{
    position:absolute;
    inset:12% 12% 20% 12%;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;z-index:2;
  }
  .animal-wrap img{
    max-width:85%;max-height:100%;
    transition:transform .15s;
  }
  .animal-wrap:active img{transform:scale(1.03);}
  .name{
    position:absolute;left:50%;bottom:10%;
    transform:translateX(-50%);
    font-size:3rem;font-weight:600;color:#444;z-index:3;
  }

  #btnPrev{left:3%;bottom:6%;}
  #btnNext{right:3%;bottom:6%;}
  #btnToHome{left:3%;top:6%;}

  .say{animation:pop .25s ease-out;}
  @keyframes pop{
    from{transform:scale(1);}
    50%{transform:scale(1.05);}
    to{transform:scale(1);}
  }

</style>
</head>
<body>
<div class="app">

  <!-- CONTROLS 4 NÚT -->
  <div id="controls">
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      <button id="btnSound" class="lang-btn">🔊</button>
      <button id="btnCZ" class="lang-btn">CZ</button>
      <button id="btnEN" class="lang-btn">EN</button>
      <button id="btnVI" class="lang-btn">VI</button>
    </div>
  </div>

  <!-- TRANG CHỦ -->
  <div id="screenHome">
    <div class="home-inner">
      <div class="home-grid" id="homeGrid"></div>
    </div>
  </div>

  <!-- FLASHCARD -->
  <div id="screenFlash">
    <div class="cloud"></div>
    <div class="animal-wrap" id="animalWrap">
      <img id="animalImg" src="" alt="">
    </div>
    <div class="name" id="animalName"></div>
    <div class="btn" id="btnPrev">
      <div class="btn-inner"><div class="arrow-left"></div></div>
    </div>
    <div class="btn" id="btnNext">
      <div class="btn-inner"><div class="arrow-right"></div></div>
    </div>
    <div class="btn" id="btnToHome">
      <div class="btn-inner"><div class="arrow-up"></div></div>
    </div>
  </div>
</div>

<audio id="audioEl"></audio>

<script>
let animals = [];
let currentIndex = 0;
let currentMode = "sound";  // sound/cz/en/vi

async function loadAnimals(){
  const res = await fetch('animals.json');
  animals = await res.json();
  updateAll();
}

function getName(a) {
  if (currentMode === "sound") return a.name_vi || a.name_en;
  if (currentMode === "cz") return a.name_cz || a.name_en;
  if (currentMode === "en") return a.name_en;
  if (currentMode === "vi") return a.name_vi || a.name_en;
  return a.name_en;
}

function getSound(a) {
  if (currentMode === "sound") return a.sound;
  return a[`sound_${currentMode}`];
}

function updateAll(){
  buildHome();
  if(document.getElementById("screenFlash").style.display === "block") {
    renderFlash();
  }
}

function buildHome(){
  const homeGrid = document.getElementById("homeGrid");
  homeGrid.innerHTML = "";
  animals.forEach((a,i)=>{
    const name = getName(a);
    const div = document.createElement("div");
    div.className = "card-small";
    div.innerHTML = `<img src="${a.image}" alt="${name}"><span>${name}</span>`;
    div.onclick = () => openFlash(i,true);
    homeGrid.appendChild(div);
  });
}

function renderFlash(){
  const a = animals[currentIndex];
  const name = getName(a);
  const img = document.getElementById("animalImg");
  img.src = a.image;
  img.alt = name;
  document.getElementById("animalName").textContent = name;
  img.classList.remove("say");
  void img.offsetWidth;
  img.classList.add("say");
}

function playSound(){
  const a = animals[currentIndex];
  const soundUrl = getSound(a);
  if(!soundUrl) return;
  const audio = document.getElementById("audioEl");
  audio.src = soundUrl;
  audio.play().catch(()=>{});
}

function openFlash(index,play){
  currentIndex = index;
  document.getElementById("screenHome").style.display = "none";
  document.getElementById("screenFlash").style.display = "block";
  renderFlash();
  if(play) playSound();
}

function backToHome(){
  document.getElementById("screenFlash").style.display = "none";
  document.getElementById("screenHome").style.display = "flex";
}

// Nút điều hướng
document.getElementById("btnPrev").onclick = () => {
  currentIndex = (currentIndex - 1 + animals.length) % animals.length;
  renderFlash();
  playSound();
};
document.getElementById("btnNext").onclick = () => {
  currentIndex = (currentIndex + 1) % animals.length;
  renderFlash();
  playSound();
};
document.getElementById("btnToHome").onclick = backToHome;

// Chạm con vật
document.getElementById("animalWrap").onclick = playSound;

// Vuốt
let startX = null;
document.getElementById("screenFlash").addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
},{passive:true});
document.getElementById("screenFlash").addEventListener("touchend", e=>{
  if(startX===null) return;
  const dx = e.changedTouches[0].clientX - startX;
  if(Math.abs(dx) > 40){
    if(dx < 0) document.getElementById("btnNext").click();
    else document.getElementById("btnPrev").click();
  }
  startX = null;
},{passive:true});

// 4 MODE NÚT
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  updateAll();
}

document.getElementById("btnSound").onclick = () => setMode("sound");
document.getElementById("btnCZ").onclick = () => setMode("cz");
document.getElementById("btnEN").onclick = () => setMode("en");
document.getElementById("btnVI").onclick = () => setMode("vi");

// Khởi động - mặc định SOUND (name_vi + sound)
loadAnimals();
document.getElementById("btnSound").classList.add("active");
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/kid/sw.js');
  });
}
</script>
</body>
</html>
